name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first — typechecking and tests both rely on each workspace's
      # generated dist/*.d.ts, since cross-package imports (e.g. @fillament/zod
      # importing types from @fillament/core) resolve through the package.json
      # `types` field. tsup writes those declarations.
      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Build landing
        env:
          # These are GitHub Actions Variables (repo Settings → Variables),
          # NOT secrets. If unset, the landing falls back to localhost defaults.
          VITE_STORYBOOK_URL: ${{ vars.STORYBOOK_URL }}
          VITE_GITHUB_URL: ${{ vars.REPO_PUBLIC_URL }}
        run: pnpm build-landing
